apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.fastapi-kube-app.svc.cluster.local:9090
        uid: prometheus
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        uid: loki
        isDefault: false
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: fastapi
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
data:
  dashboard.json: |
    {
      "id": null,
      "version": 1,
      "title": "FastAPI Observability",
      "uid": "fastapi-obs",
      "schemaVersion": 38,
      "refresh": "30s",
      "tags": ["fastapi", "loki", "prometheus"],
      "folderId": 0,
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "fastapi-app — Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"fastapi-app\"}[2m]))",
              "legendFormat": "fastapi-app"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 2,
          "title": "fastapi-orders — Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"fastapi-orders\"}[2m]))",
              "legendFormat": "fastapi-orders"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 3,
          "title": "HTTP Error Rate — 5xx (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"fastapi-app\",status=~\"5..\"}[2m]))",
              "legendFormat": "fastapi-app errors"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"fastapi-orders\",status=~\"5..\"}[2m]))",
              "legendFormat": "fastapi-orders errors"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "fixed", "fixedColor": "red" } }
          }
        },
        {
          "id": 4,
          "title": "P95 Request Latency (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"fastapi-app\"}[2m])) by (le))",
              "legendFormat": "fastapi-app p95"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"fastapi-orders\"}[2m])) by (le))",
              "legendFormat": "fastapi-orders p95"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "id": 5,
          "title": "Container CPU Usage — fastapi-kube-app",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"fastapi-kube-app\", container!=\"\", container!=\"POD\"}[2m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        },
        {
          "id": 6,
          "title": "Container Memory Usage — fastapi-kube-app",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"fastapi-kube-app\", container!=\"\", container!=\"POD\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        },
        {
          "id": 7,
          "title": "Active Targets Up — fastapi-kube-app",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(up{namespace=\"fastapi-kube-app\"} == 1)",
              "legendFormat": "Pods Scraping"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" }
        },
        {
          "id": 8,
          "title": "Total Requests — fastapi-app",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"fastapi-app\"})",
              "legendFormat": "Total"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" }
        },
        {
          "id": 9,
          "title": "Total Requests — fastapi-orders",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"fastapi-orders\"})",
              "legendFormat": "Total"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" }
        },
        {
          "id": 10,
          "title": "fastapi-app — Pod Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 28 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{service=\"fastapi-app\"}" }],
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending", "enableLogDetails": true }
        },
        {
          "id": 11,
          "title": "fastapi-orders — Pod Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 28 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{service=\"fastapi-orders\"}" }],
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending", "enableLogDetails": true }
        },
        {
          "id": 12,
          "title": "All Logs — fastapi-kube-app namespace (Promtail)",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 40 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{namespace=\"fastapi-kube-app\"}" }],
          "options": { "showTime": true, "showLabels": true, "wrapLogMessage": true, "sortOrder": "Descending", "enableLogDetails": true }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard
              mountPath: /etc/grafana/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard
          configMap:
            name: grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 80
      targetPort: 3000

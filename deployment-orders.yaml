apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-orders
  labels:
    app: fastapi-orders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-orders
  template:
    metadata:
      labels:
        app: fastapi-orders
    spec:
      containers:
        - name: fastapi-orders
          image: aagash11/fastapi-orders:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
